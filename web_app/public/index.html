<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Microsoft Blog Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div class="header-left">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 23 23" fill="none">
          <rect width="11" height="11" fill="#f25022"/>
          <rect x="12" width="11" height="11" fill="#7fba00"/>
          <rect y="12" width="11" height="11" fill="#00a4ef"/>
          <rect x="12" y="12" width="11" height="11" fill="#ffb900"/>
        </svg>
        <h1>Microsoft Blog Dashboard</h1>
      </div>
      <span class="subtitle" id="feedMeta"></span>
    </div>
    <div class="header-right">
      <div class="search-box">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="searchInput" placeholder="Search articles..." autocomplete="off" />
      </div>
      <button class="icon-btn" id="refreshBtn" title="Refresh feed">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
      </button>
      <button class="icon-btn" id="themeToggle" title="Toggle theme">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </header>

  <div class="toolbar">
    <div class="categories" id="categoryBar"></div>
    <div class="stats" id="statsBar"></div>
  </div>

  <main id="articlesGrid" class="articles-grid">
    <div class="loading-state" id="loadingState">
      <div class="spinner"></div>
      <p>Loading Microsoft blogs...</p>
    </div>
  </main>

  <div class="error-state hidden" id="errorState">
    <p>Failed to load the feed. <button id="retryBtn">Retry</button></p>
  </div>

  <script src="app.js"></script>
</body>
</html>
